<!DOCTYPE html>
<html>
<head>
<title>SAATHI - Smart Agriculture</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
  font-family: Arial;
  background:#0f172a;
  color:white;
  text-align:center;
}

h1{margin-top:20px;}

.card{
  background:#1e293b;
  margin:15px;
  padding:20px;
  border-radius:15px;
  font-size:22px;
  box-shadow:0 0 20px rgba(59,130,246,0.3);
  transition:0.3s;
}

.card:hover{transform:scale(1.05);}

button{
  padding:15px;
  font-size:18px;
  border:none;
  border-radius:10px;
  margin:10px;
  cursor:pointer;
}

.on{background:#22c55e;}
.off{background:#ef4444;}
.auto{background:#3b82f6;}
.voice{background:#facc15; color:black;}

#timer{
  margin-top:15px;
  font-size:18px;
}
</style>
</head>

<body>

<h1>🌱 SAATHI Smart Agriculture</h1>

<div class="card">🌡 Temp: <span id="temp">--</span> °C</div>
<div class="card">💧 Humidity: <span id="hum">--</span> %</div>
<div class="card">🌱 Soil: <span id="moisture">--</span></div>
<div class="card">🚿 Pump: <span id="pump">--</span></div>

<button class="on" onclick="safeClick(pumpOn)">ON</button>
<button class="off" onclick="safeClick(pumpOff)">OFF</button>
<button class="auto" onclick="safeClick(autoMode)">AUTO</button>
<br>
<button class="voice" onclick="startListening()">🎤 Talk to SAATHI</button>

<div id="timer">Ready ✅</div>

<script>

// -------- API --------
var readAPI="BGIYTY8I1XZ54ILH";
var writeAPI="1TZ7JM1RVZTK5HOY";
var channel="3252160";

let lastClick = 0;

// 🔐 Prevent spam clicks
function safeClick(func){
  let now = Date.now();
  if(now - lastClick < 15000){
    alert("Wait 15 sec ⏳");
    return;
  }
  lastClick = now;
  startTimer();
  func();
}

// ⏳ Timer
function startTimer(){
  let time = 15;
  let interval = setInterval(()=>{
    document.getElementById("timer").innerText =
      "Wait " + time + " sec ⏳";
    time--;
    if(time < 0){
      clearInterval(interval);
      document.getElementById("timer").innerText = "Ready ✅";
    }
  },1000);
}

// 📡 Load Data from ThingSpeak
function loadData(){
fetch(`https://api.thingspeak.com/channels/${channel}/feeds/last.json?api_key=${readAPI}`)
.then(res=>res.json())
.then(data=>{

document.getElementById("temp").innerText = data.field1 || "--";
document.getElementById("hum").innerText = data.field2 || "--";

// 🌱 Soil Condition
let soil = parseInt(data.field3);

if(!soil){
  document.getElementById("moisture").innerText = "--";
}
else if(soil < 1800)
  document.getElementById("moisture").innerText = "Dry 🌵";
else if(soil < 2500)
  document.getElementById("moisture").innerText = "Normal 🌱";
else
  document.getElementById("moisture").innerText = "Wet 💧";

// 🚿 Pump UI
updatePumpUI(data.field4);

})
.catch(()=>{
  document.getElementById("timer").innerText = "Connection Error ❌";
});
}

// 🎯 Update Pump UI
function updatePumpUI(state){
let pumpText = document.getElementById("pump");

if(state == 1){
  pumpText.innerText = "ON";
  pumpText.style.color="#22c55e";
}
else if(state == 0){
  pumpText.innerText = "OFF";
  pumpText.style.color="#ef4444";
}
else if(state == 2){
  pumpText.innerText = "AUTO 🤖";
  pumpText.style.color="#3b82f6";
}
}

// ⚡ Pump Controls
function pumpOn(){
updatePumpUI(1);
fetch(`https://api.thingspeak.com/update?api_key=${writeAPI}&field4=1`);
}

function pumpOff(){
updatePumpUI(0);
fetch(`https://api.thingspeak.com/update?api_key=${writeAPI}&field4=0`);
}

function autoMode(){
updatePumpUI(2);
fetch(`https://api.thingspeak.com/update?api_key=${writeAPI}&field4=2`);
}

// 🎤 Voice Recognition
const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
recognition.lang = "en-US";

function startListening(){
  document.getElementById("timer").innerText = "SAATHI Listening 🎤...";
  recognition.start();
}

recognition.onresult = function(event){
  let command = event.results[0][0].transcript.toLowerCase();
  document.getElementById("timer").innerText = "You said: " + command;
  processCommand(command);
}

// 🔊 Voice Output
function speak(text){
  let speech = new SpeechSynthesisUtterance(text);
  window.speechSynthesis.speak(speech);
}

// 🧠 SAATHI Brain
function processCommand(cmd){

  let temp = document.getElementById("temp").innerText;
  let hum = document.getElementById("hum").innerText;
  let soil = document.getElementById("moisture").innerText;
  let pump = document.getElementById("pump").innerText;

  // 🚿 Pump Control
  if(cmd.includes("turn on pump") || cmd.includes("pump on")){
    pumpOn();
    speak("Pump is now turned on");
  }

  else if(cmd.includes("turn off pump") || cmd.includes("pump off")){
    pumpOff();
    speak("Pump is now turned off");
  }

  else if(cmd.includes("auto mode")){
    autoMode();
    speak("Auto irrigation mode activated");
  }

  // 🌡 Temperature
  else if(cmd.includes("temperature")){
    speak("Current temperature is " + temp + " degree celsius");
  }

  // 💧 Humidity
  else if(cmd.includes("humidity")){
    speak("Current humidity is " + hum + " percent");
  }

  // 🌱 Soil
  else if(cmd.includes("soil")){
    speak("Soil condition is " + soil);
  }

  // 🚿 Pump Status
  else if(cmd.includes("pump status") || cmd.includes("is pump on")){
    speak("Pump is currently " + pump);
  }

  // 📊 Full Status
  else if(cmd.includes("status") || cmd.includes("all data")){
    speak(
      "Temperature is " + temp + " degree, " +
      "humidity is " + hum + " percent, " +
      "soil is " + soil + ", " +
      "pump is " + pump
    );
  }

  else{
    speak("Sorry, I did not understand");
  }
}

// 🔄 Auto Refresh
setInterval(loadData,15000);
loadData();

</script>

</body>
</html>
